name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build Docker Image
      run: docker build -f "source_code/source code/backend/Dockerfile" "source_code/source code/backend" -t my-image-name:$(date +%s)
