server:
  port: 8085

spring:
  application:
    name: ttcn-backend
  
  # Cấu hình Database (PostgreSQL / Supabase)
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  
  # Cấu hình Hibernate / JPA
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  
  # Cấu hình Security / OAuth2 với Supabase
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${SUPABASE_AUTH_ISSUER}
          jwk-set-uri: ${SUPABASE_AUTH_JWK_SET_URI}

  # Cấu hình giới hạn kích thước file upload (Dành cho việc upload tài liệu PDF)
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  
  # Cấu hình Redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3000ms
  
  # Cấu hình Cache
  cache:
    type: redis
    redis:
      time-to-live: 600000ms # 10 phút
      cache-null-values: false
  
  # Cấu hình Gửi Mail (SMTP)
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

# Cấu hình cho Google Gemini AI
gemini:
  api:
    key: ${GEMINI_API_KEY:}

# Cấu hình Log (Ghi nhật ký hệ thống)
logging:
  level:
    root: INFO
    com.ttcn.backend: DEBUG
